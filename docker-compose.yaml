services:
  app:
    build:
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-http://phoenix:6006/v1/traces}
      - DB_ENDPOINT=${DB_ENDPOINT:-db:5432}
    depends_on:
      phoenix:
        condition: service_started
      db:
        condition: service_healthy
  phoenix:
    image: arizephoenix/phoenix:commit-d501db9
    restart: always
    ports:
      - "6006:6006"
      - "4317:4317"
  db:
    image: postgres:${PG_TAG:-18.3}
    restart: always
    environment:
      - POSTGRES_USER=${PG_USER:-postgres}
      - POSTGRES_PASSWORD=${PG_PASSWORD:-postgres}
      - POSTGRES_DB=${PG_DB:-postgres}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
